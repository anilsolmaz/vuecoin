<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <title>
    <%= htmlWebpackPlugin.options.title %>
  </title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    /* Critical CSS to prevent theme flash */
    body {
      margin: 0;
      background-color: #f4f6f8;
      color: #1a202c;
      transition: none !important;
      --current-text-main: #1a202c;
    }

    body.dark-mode {
      background-color: #161a1e !important;
      color: #ffffff !important;
      --current-text-main: #ffffff;
    }

    .theme-text,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      color: var(--current-text-main) !important;
    }

    [v-cloak] {
      display: none;
    }
  </style>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('vuecoin_theme') || 'system';
        var isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (theme === 'system' && isSystemDark)) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.add('light-mode');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
  </noscript>
  <div id="app"></div>
  <!-- built files will be auto injected -->
</body>

</html>
