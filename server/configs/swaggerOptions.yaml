      tags:
        - c Data
      summary: Yazdığın text'i sana geri yollayan method
      parameters:
        - name: text
          in: path
          required: true
          description: Aşağı bi yazı gir. sana yazdığını geri göndersin API
          schema:
            type: string
      responses:
        '200':
          description: OK

